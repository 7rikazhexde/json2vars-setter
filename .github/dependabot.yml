version: 2

# Update policy
# - The shipped Python package (pip) and GitHub Actions are updated daily,
#   including major versions, so the action itself stays current and secure.
# - The language examples (npm / bundler / gomod / cargo) are demos. They are
#   updated weekly and **major-version bumps are ignored**, because a major bump
#   can raise a dependency's required language runtime above what the example
#   test matrix covers (e.g. parallel 1.x -> 2.1.0 requiring Ruby >= 3.3; see
#   issues #482 / #484). Bump example majors intentionally alongside a matrix
#   review instead of automatically.
updates:
  # Python dependencies (shipped package)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  # Node.js dependencies (example)
  - package-ecosystem: "npm"
    directory: "/examples/nodejs"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10

  # Ruby dependencies (example)
  - package-ecosystem: "bundler"
    directory: "/examples/ruby"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10

  # Go dependencies (example)
  - package-ecosystem: "gomod"
    directory: "/examples/go"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10

  # Rust dependencies (example)
  - package-ecosystem: "cargo"
    directory: "/examples/rust"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # swift-actions/setup-swift v3 is currently only a pre-release
      # (v3.0.0-beta.1). Its Linux path switched to the Swiftly installer,
      # which fails GPG signature verification on the runner
      # ("gpg: Can't check signature: No public key" —
      # swift-actions/setup-swift#798, still open). The moving `v3` tag points
      # at that beta, so Dependabot proposes it as if it were a stable major
      # (see the closed PRs #523/#527). A `versions: ["3.x"]` constraint does
      # NOT catch a moving major tag (Dependabot reports the bump target as
      # bare `3`, which a semver-wildcard range fails to match), so block it by
      # update-type instead: ignore every major bump of this action. Remove
      # this once a fixed swift-actions/setup-swift v3 is released as GA and
      # bump the major intentionally.
      - dependency-name: "swift-actions/setup-swift"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
