  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    # Wait until a release has been public for a few days before proposing it,
    # so a freshly-published (possibly compromised) version is not pulled the
    # instant it ships. Longer window for higher-impact bumps.
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # swift-actions/setup-swift v3 is currently only a pre-release
      # (v3.0.0-beta.1). Its Linux path switched to the Swiftly installer,
      # which fails GPG signature verification on the runner
      # ("gpg: Can't check signature: No public key" —
      # swift-actions/setup-swift#798, still open). The moving `v3` tag points
      # at that beta, so Dependabot proposes it as if it were a stable major
      # (see the closed PRs #523/#527). A `versions: ["3.x"]` constraint does
      # NOT catch a moving major tag (Dependabot reports the bump target as
      # bare `3`, which a semver-wildcard range fails to match), so block it by
      # update-type instead: ignore every major bump of this action. Remove
      # this once a fixed swift-actions/setup-swift v3 is released as GA and
      # bump the major intentionally.
      - dependency-name: "swift-actions/setup-swift"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
