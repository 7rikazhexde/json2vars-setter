name: Zig Test

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'examples/zig/**'
      - '.github/workflows/zig_test.yml'

# Opt JavaScript actions into Node.js 24 (deprecation of Node 20 on runners).
# Some pinned actions (szenius/set-timezone, mlugg/setup-zig, swift-actions/setup-swift)
# have no Node 24 release yet; this forces them onto Node 24 per GitHub guidance.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  set_variables:
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.json2vars.outputs.os }}
      versions_zig: ${{ steps.json2vars.outputs.versions_zig }}
      ghpages_branch: ${{ steps.json2vars.outputs.ghpages_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set variables from JSON
        id: json2vars
        uses: 7rikazhexde/json2vars-setter@v1.12.1
        with:
          json-file: examples/zig/zig_project_matrix.json

      - name: Debug output values
        run: |
          echo "os: ${{ steps.json2vars.outputs.os }}"
          echo "os[0]: ${{ fromJson(steps.json2vars.outputs.os)[0] }}"
          echo "os[1]: ${{ fromJson(steps.json2vars.outputs.os)[1] }}"
          echo "os[2]: ${{ fromJson(steps.json2vars.outputs.os)[2] }}"
          echo "versions_zig: ${{ steps.json2vars.outputs.versions_zig }}"
          echo "versions_zig[0]: ${{ fromJson(steps.json2vars.outputs.versions_zig)[0] }}"
          echo "versions_zig[1]: ${{ fromJson(steps.json2vars.outputs.versions_zig)[1] }}"
          echo "ghpages_branch: ${{ steps.json2vars.outputs.ghpages_branch }}"

  run_tests:
    needs: set_variables
    strategy:
      # Run every matrix combination even if one fails so the aggregated job
      # result reflects the status of the whole matrix (used by the badge).
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.set_variables.outputs.os) }}
        zig-version: ${{ fromJson(needs.set_variables.outputs.versions_zig) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Zig
        # mlugg/setup-zig moved its main repository to Codeberg
        # (https://codeberg.org/mlugg/setup-zig). This GitHub repo is now an
        # auto-synced MIRROR (issues/PRs not accepted there), but the maintainer
        # explicitly commits to keep supporting GitHub Actions, so this
        # `uses: mlugg/setup-zig@<sha>` reference and Dependabot tracking keep
        # working unchanged. NOTE: this is unrelated to the Zig *version fetcher*,
        # which reads the separate ziglang/zig compiler repo (still on GitHub).
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ matrix.zig-version }}

      - name: Set timezone
        uses: szenius/set-timezone@1f9716b0f7120e344f0c62bb7b1ee98819aefd42 # v2.0
        with:
          timezoneLinux: "Asia/Tokyo"
          timezoneMacos: "Asia/Tokyo"
          timezoneWindows: "Tokyo Standard Time"

      - name: Display Zig version
        run: zig version

      - name: Show matrix
        shell: bash
        run: |
          # For non-list case
          ghpages_branch="${{ needs.set_variables.outputs.ghpages_branch }}"

          # For list case, explicitly enclose the list in "" to make it a string. (Note that it is not ''.)
          os='${{ needs.set_variables.outputs.os }}'
          versions_zig='${{ needs.set_variables.outputs.versions_zig }}'

          # For list index case
          os_0="${{ fromJson(needs.set_variables.outputs.os)[0] }}"
          os_1="${{ fromJson(needs.set_variables.outputs.os)[1] }}"
          os_2="${{ fromJson(needs.set_variables.outputs.os)[2] }}"

          versions_zig_0="${{ fromJson(needs.set_variables.outputs.versions_zig)[0] }}"
          versions_zig_1="${{ fromJson(needs.set_variables.outputs.versions_zig)[1] }}"

          echo "os: ${os}"
          echo "os_0: ${os_0}"
          echo "os_1: ${os_1}"
          echo "os_2: ${os_2}"
          echo "versions_zig: ${versions_zig}"
          echo "versions_zig_0: ${versions_zig_0}"
          echo "versions_zig_1: ${versions_zig_1}"
          echo "ghpages_branch: ${ghpages_branch}"

          # For loop case
          os_list=$(echo "${os}" | jq -r '.[]' | tr '\n' ' ' | sed 's/ $//')
          zig_versions_list=$(echo "${versions_zig}" | jq -r '.[]' | tr '\n' ' ' | sed 's/ $//')

          for current_os in ${os_list}; do
            for version in ${zig_versions_list}; do
              echo "Current OS: ${current_os}, Current Zig Version: ${version}"
            done
          done

      - name: Run tests
        id: zig_test
        working-directory: ./examples/zig
        shell: bash
        # Run directly (no output capture) so test output streams to the log
        # in real time; the non-zero exit still fails this matrix leg.
        run: |
          zig test json_parser_test.zig

  update_badge:
    needs: run_tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status and color
        id: status
        shell: bash
        run: |
          # needs.run_tests.result aggregates every matrix combination:
          # 'success' only when all passed, 'failure' if any leg failed.
          case "${{ needs.run_tests.result }}" in
            success)   status=passing;   color=2ea44f ;;
            failure)   status=failing;   color=cf222e ;;
            cancelled) status=cancelled; color=808080 ;;
            skipped)   status=skipped;   color=808080 ;;
            *)         status=pending;   color=dbab09 ;;
          esac
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "color=$color" >> "$GITHUB_OUTPUT"

      - name: Create badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        continue-on-error: true
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 35f4914a9b707f6570a2c7b508e1f675
          filename: zig-test-badge.json
          label: Zig Test
          message: ${{ steps.status.outputs.status }}
          color: ${{ steps.status.outputs.color }}
          labelColor: "24292f"
          style: "flat"
          namedLogo: "github"
          logoColor: "white"
