name: Sample - Version Cache (fewer API calls)

# A runnable demonstration of the version-cache feature: drive a multi-version test
# matrix from a committed version cache so the build makes ZERO GitHub API calls on
# the hot path. The cache is refreshed only when it goes stale (cache-max-age), so a
# busy repo can test against many language versions without spending API quota on
# every run. See examples/showcase/version-cache/README.md.

on:
  # Weekly run keeps the badge fresh; cron staggered per the policy in CLAUDE.md.
  schedule:
    - cron: '17 8 * * 1'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'examples/showcase/version-cache/**'
      - '.github/workflows/sample_version_cache.yml'
      - '.github/json2vars-setter/cache/version_cache.json'
  workflow_dispatch:

# Opt JavaScript actions into Node.js 24 (deprecation of Node 20 on runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  set_variables:
    runs-on: ubuntu-latest
    outputs:
      versions_python: ${{ steps.json2vars.outputs.versions_python }}
      versions_nodejs: ${{ steps.json2vars.outputs.versions_nodejs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build the matrix from the version cache
        id: json2vars
        uses: 7rikazhexde/json2vars-setter@v1.10.0
        with:
          json-file: examples/showcase/version-cache/matrix.json
          use-cache: 'true'
          cache-languages: 'python,nodejs'
          # The committed cache fixture is intentionally old, so a very large max-age
          # is what forces a cache HIT (zero API calls) here. Lower it (e.g. '7') to
          # auto-refresh the cache from the API once it is older than N days.
          cache-max-age: '3650'
          output-count: '3'   # newest 3 cached versions per language
          cache-file: .github/json2vars-setter/cache/version_cache.json
        env:
          # Not used on the cache-hit path, but required whenever the cache is stale
          # and has to be refreshed from the API — pass it so copies keep working.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Many Python versions, all sourced from the cache, zero API calls.
  test:
    needs: set_variables
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.set_variables.outputs.versions_python) }}
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Show it works
        run: python -c "import sys; print('cached Python from the matrix:', sys.version)"

  # The same cache also backed the Node.js list — prove it with the newest one.
  node_check:
    needs: set_variables
    runs-on: ubuntu-latest
    steps:
      - name: Set up the newest cached Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ fromJson(needs.set_variables.outputs.versions_nodejs)[0] }}
      - name: Show the cached Node.js list
        run: |
          echo "Node.js versions from the cache: ${{ needs.set_variables.outputs.versions_nodejs }}"
          node --version

  update_badge:
    needs: [test, node_check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status and color
        id: status
        shell: bash
        run: |
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.node_check.result }}" == "success" ]]; then
            status=passing; color=2ea44f
          elif [[ "${{ needs.test.result }}" == "cancelled" || "${{ needs.node_check.result }}" == "cancelled" ]]; then
            status=cancelled; color=808080
          else
            status=failing; color=cf222e
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "color=$color" >> "$GITHUB_OUTPUT"

      - name: Create badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        continue-on-error: true
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: f6745f3939de53fca5fa14ed4030752d
          filename: sample-version-cache-badge.json
          label: "Sample: Version Cache"
          message: ${{ steps.status.outputs.status }}
          color: ${{ steps.status.outputs.color }}
          labelColor: "24292f"
          style: "flat"
          namedLogo: "github"
          logoColor: "white"
