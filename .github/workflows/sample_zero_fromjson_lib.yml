name: Sample - Zero fromJson (workflow_call library)

# A REUSABLE workflow (workflow_call) that hides BOTH fromJson and the test command from
# the caller: it parses the JSON, builds the matrix, and runs the project's tests by
# CONVENTION (pytest) across it. The single required fromJson lives inside this library,
# and the command is a convention with a default — so a caller writes ZERO fromJson, no
# matrix block, and no command. It only points at the JSON and the project directory.
# It is invoked by sample_zero_fromjson.yml. See examples/showcase/zero-fromjson/README.md.
#
# Demo is Python-focused and runs pytest via uv (no install step — uv provisions the
# matrix's Python and pytest in one ephemeral, PEP 723-compatible run). Copy and adapt
# the convention step for another language (read matrix_<lang> in the `test` job's
# strategy). matrix_<lang> is introduced by this change, so this uses `uses: ./`; swap to
# a pinned tag after the release that ships it.

on:
  workflow_call:
    inputs:
      json-file:
        description: 'Path to the matrix JSON file to parse'
        required: true
        type: string
      working-directory:
        description: "Project directory whose tests are run (where pytest is invoked)"
        required: false
        default: '.'
        type: string

# Opt JavaScript actions into Node.js 24 (deprecation of Node 20 on runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      matrix_python: ${{ steps.json2vars.outputs.matrix_python }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Parse the matrix JSON
        id: json2vars
        uses: ./
        with:
          json-file: ${{ inputs.json-file }}

  test:
    needs: vars
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # The ONLY fromJson — kept inside the library so the caller never writes one.
      matrix: ${{ fromJson(needs.vars.outputs.matrix_python) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run the project's tests (by convention, via uv — no install step)
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        # uv provisions the matrix's Python and runs pytest in an ephemeral env
        # (--with, PEP 723-compatible inline deps): no separate install command.
        # --no-project isolates from any surrounding pyproject.toml.
        run: uv run --no-project --python ${{ matrix.version }} --with pytest pytest
