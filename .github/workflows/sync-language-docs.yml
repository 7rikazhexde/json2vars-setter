name: Sync language docs

# Why this exists:
# The per-language pages under docs/languages/ are GENERATED from the matrix JSON
# files + the *_test.yml workflows + the version cache (see
# .github/scripts/gen_language_docs.py). The `gen-language-docs` pre-commit hook
# keeps them in sync on local commits, but Dependabot (which bumps the setup-action
# SHAs in *_test.yml) and the "Refresh data files" PR (which updates the version
# cache) never run pre-commit, so a merged bump could leave the docs stale.
#
# This workflow closes the gap: whenever a push to main changes a generator source
# (a matrix JSON, a *_test.yml workflow, the version cache, or the script itself) it
# regenerates the pages and commits the result back to main. Mirrors
# sync-doc-action-refs.yml (trusted push-to-main context, PAT push, [skip ci]). The
# commit only touches docs/languages/**, which is NOT a trigger path, so it cannot
# re-trigger this workflow.

on:
  push:
    branches:
      - main
    paths:
      - 'examples/**/*_project_matrix.json'
      - 'tests/python_project_matrix.json'
      - '.github/workflows/*_test.yml'
      - '.github/json2vars-setter/cache/version_cache.json'
      - '.github/scripts/gen_language_docs.py'
  # Manual "regenerate the language docs now" button.
  workflow_dispatch:

concurrency:
  group: sync-language-docs
  cancel-in-progress: true

# The job acts through PAT_FOR_PUSHES; no GITHUB_TOKEN scopes are required.
permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # On a fork without the PAT secret, skip quietly instead of failing.
      - name: Check that PAT_FOR_PUSHES is configured
        id: check
        env:
          PAT: ${{ secrets.PAT_FOR_PUSHES }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "PAT_FOR_PUSHES is not set; skipping."
            echo "configured=false" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout repository
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.PAT_FOR_PUSHES }}
          persist-credentials: true

      - name: Set up Python
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Regenerate language docs
        if: steps.check.outputs.configured == 'true'
        run: python3 .github/scripts/gen_language_docs.py

      - name: Commit and push if the docs changed
        if: steps.check.outputs.configured == 'true'
        run: |
          msg=":memo: docs: regenerate language pages from matrix/workflow sources [skip ci]"
          if [ -z "$(git status --porcelain)" ]; then
            echo "Language docs already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${msg}"
          # Another push-to-main workflow (notably sync-doc-action-refs, which the
          # same *_test.yml Dependabot bump also triggers) can land between our
          # checkout and push and reject this one as non-fast-forward. On rejection,
          # resync to the updated main, regenerate from the now-authoritative
          # sources, and retry -- so the result stays correct instead of failing.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); resyncing with main and regenerating."
            git fetch origin main
            git reset --hard origin/main
            python3 .github/scripts/gen_language_docs.py
            if [ -z "$(git status --porcelain)" ]; then
              echo "Language docs already current on the updated main; nothing to push."
              exit 0
            fi
            git add -A
            git commit -m "${msg}"
          done
          echo "::error::Failed to push language docs after multiple attempts."
          exit 1
