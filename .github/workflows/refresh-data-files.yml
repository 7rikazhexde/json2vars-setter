name: Refresh data files (matrix + cache)

# Why this exists:
# The committed sample data under .github/json2vars-setter/ (the default matrix,
# the version cache, and the generated template) is produced by THIS project's own
# tooling - the version fetchers hit the live GitHub/Adoptium/swift.org/Dart APIs,
# and the cache stores each release's commit SHA. Those values can therefore only
# be regenerated by running the tool, not by hand-editing (a hand-written SHA would
# be fabricated). This workflow runs the tool on a Linux runner (the fetchers crash
# on Windows OpenSSL locally) and opens a PR with the refreshed files, so the sample
# data tracks upstream releases - and grows to cover every supported language - while
# every change still goes through review + CI before it lands on main.
#
# What it regenerates (all under .github/json2vars-setter/):
#   - cache/version_cache.json      : the canonical version store, ALL languages,
#                                     with commit SHAs (refreshed from the APIs)
#   - cache/version_template.json   : a comprehensive template (all languages,
#                                     newest 10 each) generated from the cache
#   - matrix.json                   : the action's default example input (the five
#                                     primary languages, newest 5 each)
#   - sample/matrix.json            : the multi-language sample (five languages,
#                                     newest 10 each)
# Existing os / ghpages_branch / language order are preserved from each target file
# (via --existing-template), so the only churn is the version values themselves.
#
# Trigger it from the Actions tab (workflow_dispatch) whenever you want the sample
# data brought up to date. It is deliberately NOT on a schedule: the cache stores a
# fresh `last_updated` timestamp on every run, so a periodic run would open a PR even
# when no version actually changed. It never commits to main directly - it always
# opens a reviewable PR (using PAT_FOR_PUSHES so the PR's CI actually runs).

on:
  workflow_dispatch:

concurrency:
  group: refresh-data-files
  cancel-in-progress: true

# The job writes through PAT_FOR_PUSHES; GITHUB_TOKEN itself needs no extra scopes.
permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # Skip quietly on a fork / when the PAT is absent, instead of failing the
      # scheduled run (mirrors dependabot-auto-rebase.yml).
      - name: Check that PAT_FOR_PUSHES is configured
        id: check
        env:
          PAT: ${{ secrets.PAT_FOR_PUSHES }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "PAT_FOR_PUSHES is not set; skipping."
            echo "configured=false" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout repository
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Use the PAT so the branch we push opens a PR whose CI actually runs
          # (a GITHUB_TOKEN push does not trigger downstream workflows).
          token: ${{ secrets.PAT_FOR_PUSHES }}

      - name: Set up Python
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.13'

      - name: Set up uv
        if: steps.check.outputs.configured == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.check.outputs.configured == 'true'
        run: uv sync --frozen

      - name: Refresh the version cache + comprehensive template (all languages)
        if: steps.check.outputs.configured == 'true'
        env:
          # Required: the fetchers query the live release APIs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m json2vars_setter.features.version_cache \
            --languages all \
            --count 50 \
            --output-count 10 \
            --cache-file .github/json2vars-setter/cache/version_cache.json \
            --template-file .github/json2vars-setter/cache/version_template.json \
            --existing-template .github/json2vars-setter/cache/version_template.json

      - name: Regenerate the default matrix.json (primary languages, newest 5)
        if: steps.check.outputs.configured == 'true'
        run: |
          uv run python -m json2vars_setter.features.version_cache \
            --template-only \
            --languages python nodejs ruby go rust \
            --output-count 5 \
            --cache-file .github/json2vars-setter/cache/version_cache.json \
            --template-file .github/json2vars-setter/matrix.json \
            --existing-template .github/json2vars-setter/matrix.json

      - name: Regenerate sample/matrix.json (primary languages, newest 10)
        if: steps.check.outputs.configured == 'true'
        run: |
          uv run python -m json2vars_setter.features.version_cache \
            --template-only \
            --languages python nodejs ruby go rust \
            --output-count 10 \
            --cache-file .github/json2vars-setter/cache/version_cache.json \
            --template-file .github/json2vars-setter/sample/matrix.json \
            --existing-template .github/json2vars-setter/sample/matrix.json

      # Keep the generated language docs in sync with the refreshed cache (their
      # `stable` / `latest` section is read from version_cache.json), so the refresh
      # PR carries the doc updates too instead of leaving them for a follow-up.
      - name: Regenerate language docs from the refreshed cache
        if: steps.check.outputs.configured == 'true'
        run: uv run python .github/scripts/gen_language_docs.py

      - name: Open a PR if anything changed
        if: steps.check.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_PUSHES }}
        run: |
          if [ -z "$(git status --porcelain .github/json2vars-setter docs/languages)" ]; then
            echo "Data files are already up to date; nothing to do."
            exit 0
          fi

          branch="chore/refresh-data-files-${GITHUB_RUN_ID}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${branch}"
          git add .github/json2vars-setter docs/languages
          git commit -m ":arrow_up: chore(data): refresh sample matrix + version cache"
          git push --set-upstream origin "${branch}"

          gh pr create \
            --base main \
            --head "${branch}" \
            --title ":arrow_up: chore(data): refresh sample matrix + version cache" \
            --body "Automated refresh of the sample data under \`.github/json2vars-setter/\` (version cache, template, default + sample matrices) from the live release APIs. Generated by the \`Refresh data files\` workflow.

            🤖 Generated with [Claude Code](https://claude.com/claude-code)"
