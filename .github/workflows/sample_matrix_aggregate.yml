name: Sample - Matrix Aggregate

# A runnable demonstration of the matrix_<lang> aggregate output: the action emits a
# ready-to-use matrix object per language, so each test job assigns a whole matrix with
# a SINGLE fromJson and uses ${{ matrix.version }} / ${{ matrix.os }} directly — no
# per-axis fromJson, no [N] index access. See examples/showcase/matrix-aggregate/README.md.
#
# NOTE: matrix_<lang> outputs are introduced by this change and do not exist in the
# published tag yet, so this sample uses `uses: ./` (the in-repo action). Swap to
# `7rikazhexde/json2vars-setter@vX.Y.Z` after the release that ships matrix_<lang>.

on:
  schedule:
    # Weekly run keeps the badge fresh; cron staggered per the policy in CLAUDE.md.
    - cron: '23 11 * * 1'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'examples/showcase/matrix-aggregate/**'
      - '.github/workflows/sample_matrix_aggregate.yml'
      # The aggregate output is produced by these, so re-validate when they change.
      - 'action.yml'
      - 'json2vars_setter/features/github_output.py'
  workflow_dispatch:

# Opt JavaScript actions into Node.js 24 (deprecation of Node 20 on runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      # Forward the ready-to-use matrix objects (one fromJson on the consumer side).
      matrix_python: ${{ steps.json2vars.outputs.matrix_python }}
      matrix_nodejs: ${{ steps.json2vars.outputs.matrix_nodejs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Parse the matrix JSON
        id: json2vars
        uses: ./
        with:
          json-file: examples/showcase/matrix-aggregate/matrix.json

  python_test:
    needs: vars
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # ONE fromJson for the whole matrix — no per-axis fromJson, no index access.
      matrix: ${{ fromJson(needs.vars.outputs.matrix_python) }}
    steps:
      - name: Set up Python ${{ matrix.version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.version }}
      - name: Show the intuitive matrix.* access
        run: |
          echo "os:      ${{ matrix.os }}"
          echo "version: ${{ matrix.version }}"
          python --version

  nodejs_test:
    needs: vars
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.vars.outputs.matrix_nodejs) }}
    steps:
      - name: Set up Node.js ${{ matrix.version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.version }}
      - name: Show the intuitive matrix.* access
        run: |
          echo "os:      ${{ matrix.os }}"
          echo "version: ${{ matrix.version }}"
          node --version

  update_badge:
    needs: [python_test, nodejs_test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status and color
        id: status
        shell: bash
        run: |
          # Aggregate both language jobs: passing only if both succeeded.
          if [ "${{ needs.python_test.result }}" = "success" ] && \
             [ "${{ needs.nodejs_test.result }}" = "success" ]; then
            status=passing; color=2ea44f
          elif [ "${{ needs.python_test.result }}" = "cancelled" ] || \
               [ "${{ needs.nodejs_test.result }}" = "cancelled" ]; then
            status=cancelled; color=808080
          else
            status=failing; color=cf222e
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "color=$color" >> "$GITHUB_OUTPUT"

      - name: Create badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        continue-on-error: true
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 89c4aa864e62d07b18fd9d8aa41bbafd
          filename: sample-matrix-aggregate-badge.json
          label: "Sample: Matrix Aggregate"
          message: ${{ steps.status.outputs.status }}
          color: ${{ steps.status.outputs.color }}
          labelColor: "24292f"
          style: "flat"
          namedLogo: "github"
          logoColor: "white"
