name: Clang Test

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'examples/clang/**'
      - '.github/workflows/clang_test.yml'

# Opt JavaScript actions into Node.js 24 (deprecation of Node 20 on runners).
# Some pinned actions (szenius/set-timezone, mlugg/setup-zig, swift-actions/setup-swift)
# have no Node 24 release yet; this forces them onto Node 24 per GitHub guidance.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  set_variables:
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.json2vars.outputs.os }}
      versions_clang: ${{ steps.json2vars.outputs.versions_clang }}
      ghpages_branch: ${{ steps.json2vars.outputs.ghpages_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set variables from JSON
        id: json2vars
        uses: 7rikazhexde/json2vars-setter@v1.13.0
        with:
          json-file: examples/clang/clang_project_matrix.json

      - name: Debug output values
        run: |
          echo "os: ${{ steps.json2vars.outputs.os }}"
          echo "os[0]: ${{ fromJson(steps.json2vars.outputs.os)[0] }}"
          echo "os[1]: ${{ fromJson(steps.json2vars.outputs.os)[1] }}"
          echo "versions_clang: ${{ steps.json2vars.outputs.versions_clang }}"
          echo "versions_clang[0]: ${{ fromJson(steps.json2vars.outputs.versions_clang)[0] }}"
          echo "versions_clang[1]: ${{ fromJson(steps.json2vars.outputs.versions_clang)[1] }}"
          echo "ghpages_branch: ${{ steps.json2vars.outputs.ghpages_branch }}"

  run_tests:
    needs: set_variables
    strategy:
      # Run every matrix combination even if one fails so the aggregated job
      # result reflects the status of the whole matrix (used by the badge).
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.set_variables.outputs.os) }}
        clang-version: ${{ fromJson(needs.set_variables.outputs.versions_clang) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Clang ${{ matrix.clang-version }}
        # No official Clang/LLVM setup action exists, and the LLVM release assets
        # are named inconsistently across versions/platforms, so a direct download
        # would be brittle. aminya/setup-cpp is the de-facto, actively-maintained
        # action for installing a specific compiler version cross-platform; it
        # exports CC/CXX pointing at the installed LLVM clang.
        uses: aminya/setup-cpp@8170d66c458f4a045220b7b0966c10940bb2a15d # v1.8.1
        with:
          compiler: llvm-${{ matrix.clang-version }}

      - name: Set timezone
        uses: szenius/set-timezone@1f9716b0f7120e344f0c62bb7b1ee98819aefd42 # v2.0
        with:
          timezoneLinux: "Asia/Tokyo"
          timezoneMacos: "Asia/Tokyo"
          timezoneWindows: "Tokyo Standard Time"

      - name: Display Clang version
        shell: bash
        # Use $CXX (set by setup-cpp to the installed LLVM clang++) so macOS does
        # not silently fall back to the runner's Apple clang.
        run: |
          "${CXX:-clang++}" --version

      - name: Show matrix
        shell: bash
        run: |
          # For non-list case
          ghpages_branch="${{ needs.set_variables.outputs.ghpages_branch }}"

          # For list case, explicitly enclose the list in "" to make it a string. (Note that it is not ''.)
          os='${{ needs.set_variables.outputs.os }}'
          versions_clang='${{ needs.set_variables.outputs.versions_clang }}'

          # For list index case
          os_0="${{ fromJson(needs.set_variables.outputs.os)[0] }}"
          os_1="${{ fromJson(needs.set_variables.outputs.os)[1] }}"

          versions_clang_0="${{ fromJson(needs.set_variables.outputs.versions_clang)[0] }}"
          versions_clang_1="${{ fromJson(needs.set_variables.outputs.versions_clang)[1] }}"

          echo "os: ${os}"
          echo "os_0: ${os_0}"
          echo "os_1: ${os_1}"
          echo "versions_clang: ${versions_clang}"
          echo "versions_clang_0: ${versions_clang_0}"
          echo "versions_clang_1: ${versions_clang_1}"
          echo "ghpages_branch: ${ghpages_branch}"

          # For loop case
          os_list=$(echo "${os}" | jq -r '.[]' | tr '\n' ' ' | sed 's/ $//')
          clang_versions_list=$(echo "${versions_clang}" | jq -r '.[]' | tr '\n' ' ' | sed 's/ $//')

          for current_os in ${os_list}; do
            for version in ${clang_versions_list}; do
              echo "Current OS: ${current_os}, Current Clang Version: ${version}"
            done
          done

      - name: Run tests
        id: clang_test
        working-directory: ./examples/clang
        shell: bash
        # Compile the framework-free test with the matrix's clang++ and run it.
        # A failed assertion exits non-zero and fails this matrix leg.
        run: |
          "${CXX:-clang++}" -std=c++17 json_parser_test.cpp -o json_parser_test
          ./json_parser_test

  update_badge:
    needs: run_tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status and color
        id: status
        shell: bash
        run: |
          # needs.run_tests.result aggregates every matrix combination:
          # 'success' only when all passed, 'failure' if any leg failed.
          case "${{ needs.run_tests.result }}" in
            success)   status=passing;   color=2ea44f ;;
            failure)   status=failing;   color=cf222e ;;
            cancelled) status=cancelled; color=808080 ;;
            skipped)   status=skipped;   color=808080 ;;
            *)         status=pending;   color=dbab09 ;;
          esac
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "color=$color" >> "$GITHUB_OUTPUT"

      - name: Create badge
        uses: schneegans/dynamic-badges-action@28b0fa8bdeb46170ac397105ece0c1fe58f68910 # v1.9.0
        continue-on-error: true
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2c43b151be4ae76045051178ef6830e1
          filename: clang-test-badge.json
          label: Clang Test
          message: ${{ steps.status.outputs.status }}
          color: ${{ steps.status.outputs.color }}
          labelColor: "24292f"
          style: "flat"
          namedLogo: "llvm"
          logoColor: "white"
