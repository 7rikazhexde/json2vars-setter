name: Sample - Reusable matrix (workflow_call library)

# A REUSABLE workflow (workflow_call) that turns a JSON file into matrix outputs and
# exposes them to any caller. It is not triggered on its own — it is invoked by
# sample_reusable_workflow.yml (and is meant to be copied as a central, org-wide
# "define the matrix once" building block). See examples/showcase/reusable/README.md.

on:
  workflow_call:
    inputs:
      json-file:
        description: 'Path to the matrix JSON file to parse'
        required: true
        type: string
    outputs:
      os:
        description: 'JSON array of operating systems'
        value: ${{ jobs.vars.outputs.os }}
      versions_python:
        description: 'JSON array of Python versions'
        value: ${{ jobs.vars.outputs.versions_python }}
      versions_nodejs:
        description: 'JSON array of Node.js versions'
        value: ${{ jobs.vars.outputs.versions_nodejs }}

# Opt JavaScript actions into Node.js 24 (deprecation of Node 20 on runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.json2vars.outputs.os }}
      versions_python: ${{ steps.json2vars.outputs.versions_python }}
      versions_nodejs: ${{ steps.json2vars.outputs.versions_nodejs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Parse the matrix JSON
        id: json2vars
        uses: 7rikazhexde/json2vars-setter@v1.10.0
        with:
          json-file: ${{ inputs.json-file }}
