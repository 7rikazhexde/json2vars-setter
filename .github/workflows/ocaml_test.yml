name: OCaml Test

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'examples/ocaml/**'
      - '.github/workflows/ocaml_test.yml'

# Opt JavaScript actions into Node.js 24 (deprecation of Node 20 on runners).
# Some pinned actions (szenius/set-timezone, mlugg/setup-zig, swift-actions/setup-swift)
# have no Node 24 release yet; this forces them onto Node 24 per GitHub guidance.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  set_variables:
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.json2vars.outputs.os }}
      versions_ocaml: ${{ steps.json2vars.outputs.versions_ocaml }}
      ghpages_branch: ${{ steps.json2vars.outputs.ghpages_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set variables from JSON
        id: json2vars
        uses: 7rikazhexde/json2vars-setter@v1.10.0
        with:
          json-file: examples/ocaml/ocaml_project_matrix.json

      - name: Debug output values
        run: |
          echo "os: ${{ steps.json2vars.outputs.os }}"
          echo "os[0]: ${{ fromJson(steps.json2vars.outputs.os)[0] }}"
          echo "os[1]: ${{ fromJson(steps.json2vars.outputs.os)[1] }}"
          echo "versions_ocaml: ${{ steps.json2vars.outputs.versions_ocaml }}"
          echo "versions_ocaml[0]: ${{ fromJson(steps.json2vars.outputs.versions_ocaml)[0] }}"
          echo "versions_ocaml[1]: ${{ fromJson(steps.json2vars.outputs.versions_ocaml)[1] }}"
          echo "ghpages_branch: ${{ steps.json2vars.outputs.ghpages_branch }}"

  run_tests:
    needs: set_variables
    strategy:
      # Run every matrix combination even if one fails so the aggregated job
      # result reflects the status of the whole matrix (used by the badge).
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.set_variables.outputs.os) }}
        ocaml-version: ${{ fromJson(needs.set_variables.outputs.versions_ocaml) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
        with:
          ocaml-compiler: ${{ matrix.ocaml-version }}

      - name: Set timezone
        uses: szenius/set-timezone@1f9716b0f7120e344f0c62bb7b1ee98819aefd42 # v2.0
        with:
          timezoneLinux: "Asia/Tokyo"
          timezoneMacos: "Asia/Tokyo"
          timezoneWindows: "Tokyo Standard Time"

      - name: Display OCaml version
        # setup-ocaml installs into an opam switch; the `ocaml` binary is only on
        # PATH inside the opam environment, so invoke it via `opam exec --`.
        run: opam exec -- ocaml --version

      - name: Show matrix
        shell: bash
        run: |
          # For non-list case
          ghpages_branch="${{ needs.set_variables.outputs.ghpages_branch }}"

          # For list case, explicitly enclose the list in "" to make it a string. (Note that it is not ''.)
          os='${{ needs.set_variables.outputs.os }}'
          versions_ocaml='${{ needs.set_variables.outputs.versions_ocaml }}'

          # For list index case
          os_0="${{ fromJson(needs.set_variables.outputs.os)[0] }}"
          os_1="${{ fromJson(needs.set_variables.outputs.os)[1] }}"

          versions_ocaml_0="${{ fromJson(needs.set_variables.outputs.versions_ocaml)[0] }}"
          versions_ocaml_1="${{ fromJson(needs.set_variables.outputs.versions_ocaml)[1] }}"

          echo "os: ${os}"
          echo "os_0: ${os_0}"
          echo "os_1: ${os_1}"
          echo "versions_ocaml: ${versions_ocaml}"
          echo "versions_ocaml_0: ${versions_ocaml_0}"
          echo "versions_ocaml_1: ${versions_ocaml_1}"
          echo "ghpages_branch: ${ghpages_branch}"

          # For loop case
          os_list=$(echo "${os}" | jq -r '.[]' | tr '\n' ' ' | sed 's/ $//')
          ocaml_versions_list=$(echo "${versions_ocaml}" | jq -r '.[]' | tr '\n' ' ' | sed 's/ $//')

          for current_os in ${os_list}; do
            for version in ${ocaml_versions_list}; do
              echo "Current OS: ${current_os}, Current OCaml Version: ${version}"
            done
          done

      - name: Run tests
        id: ocaml_test
        working-directory: ./examples/ocaml
        shell: bash
        # Run directly (no output capture) so test output streams to the log
        # in real time; the non-zero exit still fails this matrix leg.
        run: |
          opam install . --deps-only --yes
          opam exec -- dune exec ./bin/main.exe

  update_badge:
    needs: run_tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status and color
        id: status
        shell: bash
        run: |
          # needs.run_tests.result aggregates every matrix combination:
          # 'success' only when all passed, 'failure' if any leg failed.
          case "${{ needs.run_tests.result }}" in
            success)   status=passing;   color=2ea44f ;;
            failure)   status=failing;   color=cf222e ;;
            cancelled) status=cancelled; color=808080 ;;
            skipped)   status=skipped;   color=808080 ;;
            *)         status=pending;   color=dbab09 ;;
          esac
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "color=$color" >> "$GITHUB_OUTPUT"

      - name: Create badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ac8d039239f77264250f852a38143043
          filename: ocaml-test-badge.json
          label: OCaml Test
          message: ${{ steps.status.outputs.status }}
          color: ${{ steps.status.outputs.color }}
          labelColor: "24292f"
          style: "flat"
          namedLogo: "github"
          logoColor: "white"
