name: Update Requirements after Dependabot Merge

# ワークフローの処理の流れ:
# 1. トリガー条件:
#    - プルリクエストがマージされたとき、かつ、Dependabot によるマージであること
#    - 手動でワークフローをトリガーするとき
# 2. 環境のセットアップ（Ubuntu、uv）
# 3. uv.lock ファイルの更新
# 4. requirements.txt と requirements-dev.txt の生成（uv export）
# 5. Gist にファイル（requirements.txt と requirements-dev.txt）をアップロード
# 6. requirements.txt と requirements-dev.txt を削除

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  update-requirements:
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_FOR_PUSHES }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Update lock file
        run: uv lock

      - name: Generate requirements files
        run: |
          uv export --frozen --no-hashes --no-emit-project --no-dev -o requirements.txt
          uv export --frozen --no-hashes --no-emit-project -o requirements-dev.txt

      - name: Upload requirements files to Gist
        env:
          GIST_TOKEN: ${{ secrets.PAT_FOR_PUSHES }}
        run: |
          upload_to_gist() {
            local file="$1"
            local gist_id="$2"
            local json_payload
            # Construct JSON with file and content using jq
            json_payload=$(jq -n --arg fname "$file" --arg content "$(cat "$file")" '{"files": {($fname): {"content": $content}}}')
            curl -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$json_payload" \
              "https://api.github.com/gists/$gist_id" || echo "Failed to upload $file to Gist"
          }
          # https://gist.github.com/7rikazhexde/1b8a23a0b26d913aeda1b900e903f3d5
          upload_to_gist "requirements.txt" "1b8a23a0b26d913aeda1b900e903f3d5"
          # https://gist.github.com/7rikazhexde/ee63b33bcb6bb21ac872c5ed41dbf4a6
          upload_to_gist "requirements-dev.txt" "ee63b33bcb6bb21ac872c5ed41dbf4a6"

      - name: Clean up local requirements files
        run: |
          rm requirements.txt requirements-dev.txt
